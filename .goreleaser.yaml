version: 2

project_name: csk

before:
  hooks:
    - go mod tidy

builds:
  - id: csk
    main: ./cmd/csk
    binary: csk
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/pformoso-deus-ai/csk/internal/cli.Version={{.Version}}

archives:
  - id: csk
    name_template: >-
      csk_{{ .Version }}_{{ .Os }}_{{ if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - SPEC.md

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: '{{ .Tag }}-SNAPSHOT-{{ .ShortCommit }}'

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^test:'
      - '^ci:'

release:
  draft: false
  prerelease: auto
  name_template: '{{.ProjectName}} {{.Version}}'
